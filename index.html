<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설계관리대장 챗봇</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #b2c7d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.phone { width: 100%; max-width: 420px; height: 92vh; max-height: 820px; background: #b2c7d9; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.35); display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: #3c1e1e; color: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.topbar-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #ffe066, #ffb700); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.topbar-info { flex: 1; }
.topbar-name { font-size: 15px; font-weight: 700; }
.topbar-sub { font-size: 11px; opacity: 0.6; margin-top: 1px; }
.chat-area { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
.date-divider { text-align: center; font-size: 11px; color: rgba(0,0,0,0.45); background: rgba(255,255,255,0.4); padding: 4px 12px; border-radius: 20px; align-self: center; }
.bot-row { display: flex; align-items: flex-start; gap: 8px; }
.bot-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #ffe066, #ffb700); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.bot-bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 75%; }
.bot-name { font-size: 11px; color: rgba(0,0,0,0.55); margin-bottom: 2px; margin-left: 2px; }
.bot-bubble { background: white; color: #1a1a1a; padding: 10px 14px; border-radius: 0 16px 16px 16px; font-size: 14px; line-height: 1.6; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.bot-time { font-size: 10px; color: rgba(0,0,0,0.4); margin-top: auto; padding-top: 18px; }
.user-row { display: flex; justify-content: flex-end; align-items: flex-end; gap: 6px; }
.user-time { font-size: 10px; color: rgba(0,0,0,0.4); }
.user-bubble { background: #ffe066; color: #1a1a1a; padding: 10px 14px; border-radius: 16px 16px 0 16px; font-size: 14px; line-height: 1.6; max-width: 72%; box-shadow: 0 1px 4px rgba(0,0,0,0.1); word-break: break-all; }
.btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-left: 44px; }
.quick-btn { background: white; border: 1.5px solid #ffe066; color: #3c1e1e; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600; transition: all 0.15s; }
.quick-btn:hover { background: #ffe066; }
.quick-btn:disabled { opacity: 0.4; cursor: default; }
.card { background: white; border-radius: 16px; padding: 14px 16px; font-size: 13px; line-height: 1.9; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card-title { font-weight: 700; font-size: 14px; color: #3c1e1e; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 8px; }
.card-row { display: flex; justify-content: space-between; }
.card-label { color: #888; }
.card-val { font-weight: 600; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.badge-직접계약 { background: #c6f6d5; color: #276749; }
.badge-입찰 { background: #bee3f8; color: #2c5282; }
.badge-수의계약 { background: #fefcbf; color: #744210; }
.badge-기타 { background: #e9d8fd; color: #553c9a; }
.list-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.list-header { background: #3c1e1e; color: white; padding: 10px 14px; font-size: 13px; font-weight: 700; }
.list-item { padding: 10px 14px; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
.list-item:last-child { border-bottom: none; }
.list-item-name { font-weight: 700; color: #1a1a1a; margin-bottom: 3px; }
.list-item-meta { color: #888; display: flex; gap: 8px; flex-wrap: wrap; }
.highlight { background: #fff176; color: #3c1e1e; border-radius: 3px; padding: 0 2px; font-weight: 700; }
.input-bar { background: #f0f0f0; border-top: 1px solid #ddd; padding: 10px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.input-field { flex: 1; background: white; border: none; border-radius: 22px; padding: 10px 16px; font-size: 14px; font-family: inherit; outline: none; }
.send-btn { width: 38px; height: 38px; background: #ffe066; border: none; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.send-btn:hover { background: #ffb700; }
.typing { display: flex; gap: 4px; padding: 8px 12px; }
.typing span { width: 8px; height: 8px; background: #bbb; border-radius: 50%; animation: bounce 1s infinite; }
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.sync-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 600; margin-left: 6px; }
.sync-ok { background: #c6f6d5; color: #276749; }
.sync-fail { background: #fed7d7; color: #c53030; }
.search-type-btn { background: white; border: 1.5px solid #2d6a9f; color: #2d6a9f; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600; transition: all 0.15s; }
.search-type-btn:hover { background: #ebf4ff; }
</style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <div class="topbar-avatar">📋</div>
    <div class="topbar-info">
      <div class="topbar-name">설계관리봇 <span id="authBadge" style="font-size:10px;opacity:0.7">🟢 연결 중</span></div>
      <div class="topbar-sub">설계관리대장 도우미</div>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-bar">
    <input class="input-field" id="inputField" placeholder="메시지를 입력하세요" onkeydown="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbww0FmeJlJ0qIUDyfu7b-9pEdM0KS2jnpkfacJTwhVEAq2UIExKgSPHUdK-UI8AOSOG-w/exec';

let userPassword = '';
let step = 'menu';
let draft = {};
let searchType = '';
const area = document.getElementById('chatArea');
const inputField = document.getElementById('inputField');

function nowStr() {
  return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}
function scrollBot() { setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50); }

function addDateDivider() {
  const d = document.createElement('div');
  d.className = 'date-divider';
  d.textContent = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  area.appendChild(d);
}

// 구글시트 저장 (JSONP) - 비밀번호 탑재 필수
function saveToSheet(data) {
  return new Promise((resolve) => {
    const cbName = 'cb_' + Date.now();
    const params = new URLSearchParams({
      action: 'save',
      pw: userPassword, 
      name: data.name,
      amount: data.amount,
      contract: data.method,
      salesperson: data.salesperson,
      agency: data.agency,
      modDate: data.modDate,
      callback: cbName
    });
    const script = document.createElement('script');
    script.src = GAS_URL + '?' + params.toString();
    window[cbName] = (res) => { delete window[cbName]; script.remove(); resolve(res && res.result === 'success'); };
    script.onerror = () => { delete window[cbName]; script.remove(); resolve(false); };
    document.body.appendChild(script);
  });
}

// 구글시트 불러오기 (JSONP) - 비밀번호 탑재 필수
function loadFromSheet() {
  return new Promise((resolve) => {
    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    script.src = GAS_URL + '?action=list&pw=' + userPassword + '&callback=' + cbName; 
    window[cbName] = (res) => { delete window[cbName]; script.remove(); resolve(res && res.result === 'success' ? res.data : null); };
    script.onerror = () => { delete window[cbName]; script.remove(); resolve(null); };
    document.body.appendChild(script);
  });
}

function botMsg(html, showAvatar = true) {
  const row = document.createElement('div');
  row.className = 'bot-row';
  row.innerHTML = `
    ${showAvatar ? `<div class="bot-avatar">📋</div>` : `<div style="width:36px;flex-shrink:0"></div>`}
    <div class="bot-bubble-wrap">
      ${showAvatar ? `<div class="bot-name">설계관리봇</div>` : ''}
      <div class="bot-bubble">${html}</div>
    </div>
    <div class="bot-time">${nowStr()}</div>
  `;
  area.appendChild(row);
  scrollBot();
}

function botCardEl(data) {
  const row = document.createElement('div');
  row.className = 'bot-row';
  row.innerHTML = `
    <div style="width:36px;flex-shrink:0"></div>
    <div class="bot-bubble-wrap" style="max-width:88%">
      <div class="card">
        <div class="card-title">📝 ${data.name}</div>
        <div class="card-row"><span class="card-label">금액</span><span class="card-val">${Number(data.amount).toLocaleString('ko-KR')} 원</span></div>
        <div class="card-row"><span class="card-label">계약방법</span><span class="card-val"><span class="badge badge-${data.method}">${data.method}</span></span></div>
        <div class="card-row"><span class="card-label">영업사원</span><span class="card-val">${data.salesperson}</span></div>
        <div class="card-row"><span class="card-label">대리점</span><span class="card-val">${data.agency}</span></div>
        <div class="card-row"><span class="card-label">수정일</span><span class="card-val">${data.modDate}</span></div>
      </div>
    </div>
  `;
  area.appendChild(row);
  scrollBot();
}

function showBtns(btns, type = 'normal') {
  const row = document.createElement('div');
  row.className = 'btn-group';
  row.innerHTML = btns.map(b => {
    const cls = type === 'search' ? 'search-type-btn' : 'quick-btn';
    return `<button class="${cls}" onclick="clickBtn('${b}')">${b}</button>`;
  }).join('');
  area.appendChild(row);
  scrollBot();
}

function userMsg(txt) {
  const row = document.createElement('div');
  row.className = 'user-row';
  row.innerHTML = `<div class="user-time">${nowStr()}</div><div class="user-bubble">${txt}</div>`;
  area.appendChild(row);
  scrollBot();
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'bot-row'; d.id = 'typing';
  d.innerHTML = `<div class="bot-avatar">📋</div><div class="bot-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(d); scrollBot();
}
function hideTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

function clickBtn(val) {
  document.querySelectorAll('.quick-btn, .search-type-btn').forEach(b => b.disabled = true);
  userMsg(val);
  handleInput(val);
}

function sendMsg() {
  const v = inputField.value.trim();
  if (!v) return;
  inputField.value = '';
  userMsg(v);
  handleInput(v);
}

function highlight(text, keyword) {
  if (!keyword) return text;
  const escaped = keyword.replace(/[.*+?^${}()|[\]\\/]/g, '\\$&');
  return String(text).replace(new RegExp(escaped, 'gi'), m => `<span class="highlight">${m}</span>`);
}

async function showList() {
  showTyping();
  const rows = await loadFromSheet();
  hideTyping();
  if (!rows) { botMsg('❌ 인증 오류 또는 데이터 로드 실패', false); return; }
  if (rows.length === 0) { botMsg('등록된 건이 없습니다.', false); return; }
  renderList(rows, null, null);
}

function renderList(rows, keyword, field) {
  const total = rows.reduce((s, r) => s + (Number(String(r['금액']).replace(/,/g,'')) || 0), 0);
  const el = document.createElement('div');
  el.className = 'bot-row';
  const items = rows.map((r, i) => {
    const name     = field === '건명'     ? highlight(r['건명'] || '-', keyword)     : (r['건명'] || '-');
    const sales    = field === '영업사원'  ? highlight(r['영업사원'] || '-', keyword)  : (r['영업사원'] || '-');
    const agency   = field === '대리점'   ? highlight(r['대리점'] || '-', keyword)    : (r['대리점'] || '-');
    return `
      <div class="list-item">
        <div class="list-item-name">${i+1}. ${name}</div>
        <div class="list-item-meta">
          <span style="font-weight: bold;">${Number(r['금액']).toLocaleString('ko-KR')}원</span>
          <span class="badge badge-${r['계약방법']}">${r['계약방법'] || '-'}</span>
          <span>👤 ${sales}</span>
          <span>🏢 ${agency}</span>
          <span>📅 ${r['수정일'] || '-'}</span>
        </div>
      </div>`;
  }).join('');

  const title = keyword ? `🔍 "${keyword}" 검색결과 ${rows.length}건` : `📋 총 ${rows.length}건`;
  el.innerHTML = `
    <div style="width:36px;flex-shrink:0"></div>
    <div style="max-width:92%">
      <div class="list-card">
        <div class="list-header">${title} | 합계 ${total.toLocaleString('ko-KR')}원</div>
        ${items}
      </div>
    </div>`;
  area.appendChild(el);
  scrollBot();
}

function showMenu() {
  step = 'menu';
  setTimeout(() => {
    botMsg('무엇을 도와드릴까요? 😊', false);
    
    // 🔐 권한에 따른 분기제어: admin 암호(예: admin1234!)일 때만 새 건 등록 버튼 활성화
    if (userPassword === 'admin1234!') {
      showBtns(['✏️ 새 건 등록', '🔍 검색']);
    } else {
      showBtns(['🔍 검색']); // 일반 사용자는 검색만 보임
    }
  }, 100);
}

async function handleInput(val) {
  if (step === 'menu') {
    if (val === '✏️ 새 건 등록' && userPassword === 'admin1234!') {
      step = 'name'; draft = {};
      showTyping(); setTimeout(() => { hideTyping(); botMsg('건명을 입력해 주세요. 📝'); }, 600);
    } else if (val === '🔍 검색') {
      step = 'searchType';
      botMsg('어떤 항목으로 검색할까요? 🔍', false);
      showBtns(['📌 건명 검색', '👤 영업사원 검색', '🏢 대리점 검색'], 'search');
    } else {
      botMsg('아래 메뉴를 선택해 주세요 😊', false);
      showMenu();
    }
    return;
  }

  if (step === 'searchType') {
    const map = { '📌 건명 검색': '건명', '👤 영업사원 검색': '영업사원', '🏢 대리점 검색': '대리점' };
    if (!map[val]) {
      botMsg('버튼을 눌러 선택해 주세요.', false);
      showBtns(['📌 건명 검색', '👤 영업사원 검색', '🏢 대리점 검색'], 'search');
      return;
    }
    searchType = map[val];
    step = 'searchKeyword';
    showTyping();
    setTimeout(() => { hideTyping(); botMsg(`${searchType} 검색어를 입력해 주세요. 🔎`, false); }, 500);
    return;
  }

  if (step === 'searchKeyword') {
    const keyword = val.trim();
    botMsg(`⏳ <b>${searchType}</b> 에서 "<b>${keyword}</b>" 검색 중...`, false);
    showTyping();
    const rows = await loadFromSheet();
    hideTyping();

    if (!rows) {
      botMsg('❌ 데이터를 가져오지 못했습니다. 권한을 확인하세요.', false);
    } else if (rows.length === 0) {
      botMsg('등록된 데이터가 없습니다.', false);
    } else {
      const fieldMap = { '건명': '건명', '영업사원': '영업사원', '대리점': '대리점' };
      const col = fieldMap[searchType];
      const filtered = rows.filter(r => String(r[col] || '').toLowerCase().includes(keyword.toLowerCase()));
      if (filtered.length === 0) {
        botMsg(`"<b>${keyword}</b>" 에 해당하는 결과가 없습니다. 😥`, false);
      } else {
        renderList(filtered, keyword, searchType);
      }
    }
    setTimeout(() => {
      botMsg('다른 검색을 하시겠어요?', false);
      showBtns(['🔍 다시 검색', '🏠 메인으로']);
    }, 300);
    step = 'searchDone';
    return;
  }

  if (step === 'searchDone') {
    if (val === '🔍 다시 검색') {
      step = 'searchType';
      botMsg('어떤 항목으로 검색할까요? 🔍', false);
      showBtns(['📌 건명 검색', '👤 영업사원 검색', '🏢 대리점 검색'], 'search');
    } else {
      showMenu();
    }
    return;
  }

  // ── 등록 플로우 (관리자 전용) ──
  if (userPassword !== 'admin1234!') {
    botMsg('❌ 등록 권한이 없습니다.', false);
    showMenu();
    return;
  }

  showTyping();
  await new Promise(r => setTimeout(r, 500));
  hideTyping();

  if (step === 'name') {
    draft.name = val; step = 'amount';
    botMsg('금액을 입력해 주세요. (숫자만) 💰', false);
  } else if (step === 'amount') {
    const n = val.replace(/,/g, '');
    if (isNaN(n) || n === '') { botMsg('숫자를 입력해 주세요. 💰', false); return; }
    draft.amount = n; step = 'method';
    botMsg('계약방법을 선택해 주세요. 📄', false);
    showBtns(['직접계약', '입찰', '수의계약', '기타']);
  } else if (step === 'method') {
    if (!['직접계약','입찰','수의계약','기타'].includes(val)) {
      botMsg('버튼을 눌러 선택해 주세요.', false);
      showBtns(['직접계약','입찰','수의계약','기타']); return;
    }
    draft.method = val; step = 'salesperson';
    botMsg('영업사원 이름을 입력해 주세요. 👤', false);
  } else if (step === 'salesperson') {
    draft.salesperson = val; step = 'agency';
    botMsg('대리점명을 입력해 주세요. 🏢', false);
  } else if (step === 'agency') {
    draft.agency = val; step = 'modDate';
    botMsg('수정일을 입력해 주세요. (예: 2026-06-18) 📅', false);
  } else if (step === 'modDate') {
    draft.modDate = val; step = 'confirm';
    botMsg('아래 내용으로 등록할까요? ✅', false);
    botCardEl(draft);
    showBtns(['✅ 등록하기', '✏️ 다시 입력']);
  } else if (step === 'confirm') {
    if (val === '✅ 등록하기') {
      step = 'saving';
      botMsg('⏳ 구글시트에 저장 중...', false);
      const ok = await saveToSheet(draft);
      if (ok) {
        botMsg(`✅ <b>${draft.name}</b> 이(가) 구글시트에 저장되었습니다! <span class="sync-badge sync-ok">저장 완료</span>`, false);
      } else {
        botMsg(`❌ 저장에 실패했습니다. 권한 혹은 백엔드 코드를 확인하세요. <span class="sync-badge sync-fail">저장 실패</span>`, false);
      }
      showMenu();
    } else {
      step = 'name'; draft = {};
      botMsg('다시 입력할게요. 건명을 입력해 주세요. 📝', false);
    }
  }
}

window.onload = () => {
  const pwInput = prompt('설계관리대장 비밀번호를 입력하세요:');
  if (!pwInput) {
    alert('비밀번호가 필요합니다. 페이지를 새로고침하여 다시 입력하세요.');
    return;
  }
  userPassword = pwInput.trim(); 

  // 상단 바 배포 명칭 변경
  const badgeEl = document.getElementById('authBadge');
  if (userPassword === 'admin1234!') {
    badgeEl.textContent = '🟢 관리자 권한';
    badgeEl.className = 'sync-badge sync-ok';
  } else if (userPassword === 'user1234!') {
    badgeEl.textContent = '🔵 조회 전용';
    badgeEl.className = 'sync-badge';
    badgeEl.style.background = '#bee3f8';
    badgeEl.style.color = '#2c5282';
  } else {
    badgeEl.textContent = '🔴 미인증';
    badgeEl.className = 'sync-badge sync-fail';
  }

  addDateDivider();
  showTyping();
  setTimeout(() => {
    hideTyping();
    botMsg('안녕하세요! 👋<br>설계관리대장 도우미입니다.<br>데이터는 <b>구글시트에 실시간 연동</b>됩니다.');
    showMenu();
  }, 800);
};
</script>
</body>
</html>
